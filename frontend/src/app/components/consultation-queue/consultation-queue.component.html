<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Consultation Queue</h1>
  </div>

  <mat-card class="queue-card glass-card">
    <div class="loading-shade" *ngIf="isLoading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <table mat-table [dataSource]="dataSource" class="full-width-table">
      
      <!-- Patient ID Column -->
      <ng-container matColumnDef="patientId">
        <th mat-header-cell *matHeaderCellDef> Patient ID </th>
        <td mat-cell *matCellDef="let visit"> {{visit.patientId}} </td>
      </ng-container>

      <!-- Patient Name Column -->
      <ng-container matColumnDef="patientName">
        <th mat-header-cell *matHeaderCellDef> Patient Name </th>
        <td mat-cell *matCellDef="let visit"> <strong>{{visit.patientName}}</strong> </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let visit">
          <span class="status-badge" [ngClass]="visit.visitStatus?.toLowerCase() || ''">
            {{visit.visitStatus}}
          </span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let visit">
          <button mat-raised-button color="primary" *ngIf="visit.visitStatus === 'WAITING'" (click)="startConsultation(visit.visitId)" style="margin-right: 8px;">
            Start Consultation
          </button>
          <button mat-stroked-button color="primary" *ngIf="visit.visitStatus === 'CONSULTED'" (click)="startConsultation(visit.visitId)" style="margin-right: 8px;">
            View Details
          </button>
          <button mat-stroked-button color="accent" (click)="viewHistory(visit)">
            <mat-icon>history</mat-icon> View History
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4" class="no-data-cell">
          No patients in the queue for this date.
        </td>
      </tr>
    </table>
  </mat-card>
</div>
