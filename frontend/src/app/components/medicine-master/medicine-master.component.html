<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Medicine Master</h1>
    <div class="header-actions">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search Medicine</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Paracetamol">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
      
      <button mat-raised-button color="primary" class="add-btn" (click)="openDialog()">
        <mat-icon>add</mat-icon> Add Medicine
      </button>
    </div>
  </div>

  <mat-card class="table-card glass-card">
    <div class="loading-shade" *ngIf="isLoading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <table mat-table [dataSource]="dataSource" matSort class="full-width-table">
      
      <!-- ID Column -->
      <ng-container matColumnDef="medicineId">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
        <td mat-cell *matCellDef="let element"> {{element.medicineId}} </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="medicineName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Medicine Name </th>
        <td mat-cell *matCellDef="let element"> {{element.medicineName}} </td>
      </ng-container>

      <!-- Dosage Column -->
      <ng-container matColumnDef="dosage">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Default Dosage </th>
        <td mat-cell *matCellDef="let element"> {{element.dosage}} </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="primary" (click)="openDialog(element)" matTooltip="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteMedicine(element)" matTooltip="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4" class="no-data-cell">No data matching the filter.</td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of medicines"></mat-paginator>
  </mat-card>
</div>
