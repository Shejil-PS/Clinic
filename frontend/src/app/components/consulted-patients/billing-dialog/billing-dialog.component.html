<h2 mat-dialog-title>Generate Bill</h2>
<mat-dialog-content>
  <div class="patient-info">
    <p><strong>Patient:</strong> {{data.patientName}} ({{data.patientId}})</p>
    <p><strong>Visit ID:</strong> {{data.visitId}}</p>
  </div>
  
  <form [formGroup]="billForm" class="bill-form">
    <div class="fees-section">
      <h3>Charges</h3>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Consultation Fee (Rs)</mat-label>
        <input matInput type="number" formControlName="consultationFee" (input)="calculateTotal()">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Treatment Charges (Rs)</mat-label>
        <input matInput type="number" formControlName="treatmentCharges" (input)="calculateTotal()">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Medicines Charges (Rs)</mat-label>
        <input matInput type="number" formControlName="medicineCharges" (input)="calculateTotal()">
      </mat-form-field>
      
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Discount (Rs)</mat-label>
        <input matInput type="number" formControlName="discount" (input)="calculateTotal()">
      </mat-form-field>
    </div>

    <div class="total-section">
      <h3>Total Amount: Rs. {{totalAmount}}</h3>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" [disabled]="billForm.invalid" (click)="saveBill()">
    <mat-icon>receipt_long</mat-icon> Save & Print Bill
  </button>
</mat-dialog-actions>
