<div class="page-container">
  <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
    <h1 class="page-title" style="margin: 0;">Consulted Patients</h1>
    <button mat-raised-button color="accent" (click)="exportToCsv()" [disabled]="!dataSource || dataSource.data.length === 0">
      <mat-icon>download</mat-icon> Export to CSV
    </button>
  </div>

  <mat-card class="glass-card table-card">
    <div class="loading-shade" *ngIf="isLoading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <table mat-table [dataSource]="dataSource" class="full-width-table">
      
      <!-- Patient ID Column -->
      <ng-container matColumnDef="patientId">
        <th mat-header-cell *matHeaderCellDef> Patient ID </th>
        <td mat-cell *matCellDef="let visit"> {{visit.patientId}} </td>
      </ng-container>

      <!-- Patient Name Column -->
      <ng-container matColumnDef="patientName">
        <th mat-header-cell *matHeaderCellDef> Patient Name </th>
        <td mat-cell *matCellDef="let visit"> <strong>{{visit.patientName}}</strong> </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let visit">
          <span class="status-badge consulted">
            {{visit.visitStatus}}
          </span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let visit">
          <button mat-stroked-button color="primary" (click)="openBillingDialog(visit)">
            <mat-icon>receipt</mat-icon> Generate Bill
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4" class="no-data-cell">
          No consulted patients found for this date.
        </td>
      </tr>
    </table>
  </mat-card>
</div>
