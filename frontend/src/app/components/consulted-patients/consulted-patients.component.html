<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Consulted Patients</h1>
    
    <mat-form-field appearance="outline">
      <mat-label>Filter by Date</mat-label>
      <input matInput type="date" [value]="selectedDate" (change)="onDateChange($event)">
    </mat-form-field>
  </div>

  <mat-card class="glass-card table-card">
    <div class="loading-shade" *ngIf="isLoading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <table mat-table [dataSource]="dataSource" class="full-width-table">
      
      <!-- Patient ID Column -->
      <ng-container matColumnDef="patientId">
        <th mat-header-cell *matHeaderCellDef> Patient ID </th>
        <td mat-cell *matCellDef="let visit"> {{visit.patientId}} </td>
      </ng-container>

      <!-- Patient Name Column -->
      <ng-container matColumnDef="patientName">
        <th mat-header-cell *matHeaderCellDef> Patient Name </th>
        <td mat-cell *matCellDef="let visit"> <strong>{{visit.patientName}}</strong> </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let visit">
          <span class="status-badge consulted">
            {{visit.status}}
          </span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let visit">
          <button mat-stroked-button color="primary" (click)="openBillingDialog(visit)" style="margin-right: 8px;">
            <mat-icon>receipt</mat-icon> Bill
          </button>
          <button mat-stroked-button color="accent" (click)="printPrescription(visit)">
            <mat-icon>print</mat-icon> Prescription
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4" class="no-data-cell">
          No consulted patients found for this date.
        </td>
      </tr>
    </table>
  </mat-card>
</div>
