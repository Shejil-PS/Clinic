<div class="login-container">
  <mat-card class="glass-card login-card">
    <mat-card-header>
      <mat-card-title class="clinic-title">Dental Clinic Management</mat-card-title>
      <mat-card-subtitle>Staff Portal Login</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" placeholder="Enter your username" required>
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">Username is required</mat-error>
        </mat-form-field>
        
        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'" placeholder="Enter your password" required>
          <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
        </mat-form-field>
        
        <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>
        
        <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid || isLoading" class="login-btn">
          <span *ngIf="!isLoading">Login</span>
          <mat-spinner diameter="24" *ngIf="isLoading"></mat-spinner>
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
